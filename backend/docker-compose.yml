services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dask-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dask
    ports:
      - '5432:5432'
    volumes:
      - dask_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    container_name: dask-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - dask_redis_data:/data

volumes:
  dask_postgres_data:
  dask_redis_data:
